<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 智能体 · 登录</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --text-tertiary: #aeaeb2;
      --border: #d2d2d7;
      --border-focus: #1d1d1f;
      --error: #ff3b30;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.06);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", "PingFang SC", system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: 1.22fr 0.78fr;
      gap: 40px;
      align-items: center;
    }

    /* ── Left: Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      gap: 28px;
      padding-right: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--text);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    .brand-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.2px;
    }

    .hero h1 {
      font-size: 36px;
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .hero-sub {
      font-size: 17px;
      line-height: 1.6;
      color: var(--text-secondary);
      max-width: 42ch;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .feature {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .feature-icon {
      width: 28px; height: 28px;
      border-radius: 999px;
      background: #f5f5f7;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .feature-icon svg {
      width: 14px; height: 14px;
      color: var(--text);
    }

    .feature-text b {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .feature-text span {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .hero-visual {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: var(--radius-lg);
      background: #fff;
      box-shadow: var(--shadow-md);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .hero-visual svg {
      width: 88%;
      height: 88%;
    }

    /* ── Right: Login Card ── */
    .login-panel {
      display: flex;
      align-items: center;
    }

    .card {
      width: 100%;
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 40px 36px 36px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card h2 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: var(--text);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.1px;
    }

    .field input {
      width: 100%;
      height: 46px;
      padding: 0 15px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-family: var(--font);
      font-size: 15px;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      -webkit-appearance: none;
    }

    .field input::placeholder {
      color: var(--text-tertiary);
    }

    .field input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(29,29,31,0.08);
    }

    .field input.error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(255,59,48,0.1);
    }

    .btn {
      width: 100%;
      height: 46px;
      border: none;
      border-radius: 9999px;
      background: var(--text);
      color: #fff;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: opacity 0.18s ease, transform 0.12s ease;
      -webkit-appearance: none;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.985); }

    .msg {
      min-height: 18px;
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      transition: color 0.2s ease;
    }

    .msg.error { color: var(--error); }

    .forgot {
      display: block;
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.18s ease;
      margin-top: -8px;
    }

    .forgot:hover { color: var(--text); }

    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      body {
        padding: 16px;
        align-items: flex-start;
        min-height: 100%;
      }

      .page {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .hero {
        padding-right: 0;
        gap: 18px;
        text-align: center;
        align-items: center;
      }

      .hero h1 { font-size: 28px; }

      .hero-sub {
        font-size: 15px;
        max-width: 38ch;
      }

      .features { align-items: center; }

      .feature { text-align: left; }

      .hero-visual {
        aspect-ratio: 16 / 9;
        max-width: 420px;
      }

      .card { padding: 28px 22px; }
    }
  </style>
</head>
<body>
  <main class="page">

    <!-- ═══ Left: Hero ═══ -->
    <section class="hero" aria-label="产品介绍">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">AI</div>
        <span class="brand-label">AI Agent Scaffold</span>
      </div>

      <h1>你的智能助手</h1>

      <p class="hero-sub">
        多模型、多工具、多工作流 — 一个能帮你把事做完的企业级 AI Agent 平台。
      </p>

      <div class="features">
        <div class="feature">
          <div class="feature-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
          </div>
          <div class="feature-text">
            <b>灵活的工作流编排</b>
            <span>顺序、并行、循环 — 按需组合 Agent 与工具调用链路</span>
          </div>
        </div>

        <div class="feature">
          <div class="feature-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </div>
          <div class="feature-text">
            <b>全链路可观测</b>
            <span>对话、工具调用、成本 — 每一步都可追溯与审计</span>
          </div>
        </div>
      </div>

      <div class="hero-visual" aria-label="AI 节点网络示意">
        <svg viewBox="0 0 320 240" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Connection lines -->
          <g stroke="#d2d2d7" stroke-width="1.2" stroke-linecap="round">
            <line x1="160" y1="80"  x2="100" y2="44"  />
            <line x1="160" y1="80"  x2="220" y2="44"  />
            <line x1="160" y1="80"  x2="70"  y2="120" />
            <line x1="160" y1="80"  x2="250" y2="120" />
            <line x1="160" y1="80"  x2="100" y2="180" />
            <line x1="160" y1="80"  x2="220" y2="180" />
            <line x1="160" y1="80"  x2="160" y2="190" />
            <!-- Cross connections -->
            <line x1="100" y1="44"  x2="70"  y2="120" opacity="0.4" />
            <line x1="220" y1="44"  x2="250" y2="120" opacity="0.4" />
            <line x1="70"  y1="120" x2="100" y2="180" opacity="0.4" />
            <line x1="250" y1="120" x2="220" y2="180" opacity="0.4" />
            <line x1="100" y1="180" x2="160" y2="190" opacity="0.4" />
            <line x1="220" y1="180" x2="160" y2="190" opacity="0.4" />
          </g>

          <!-- Nodes (circles) -->
          <g>
            <!-- Center node (larger) -->
            <circle cx="160" cy="80" r="22" fill="#1d1d1f" opacity="0.08" />
            <circle cx="160" cy="80" r="10" fill="#1d1d1f" opacity="0.18" />
            <circle cx="160" cy="80" r="4"  fill="#1d1d1f" />

            <!-- Top nodes -->
            <circle cx="100" cy="44" r="14" fill="#e8e8ed" stroke="#d2d2d7" stroke-width="1" />
            <circle cx="100" cy="44" r="5"  fill="#86868b" />
            <circle cx="220" cy="44" r="14" fill="#e8e8ed" stroke="#d2d2d7" stroke-width="1" />
            <circle cx="220" cy="44" r="5"  fill="#86868b" />

            <!-- Side nodes -->
            <circle cx="70"  cy="120" r="14" fill="#e8e8ed" stroke="#d2d2d7" stroke-width="1" />
            <circle cx="70"  cy="120" r="5"  fill="#86868b" />
            <circle cx="250" cy="120" r="14" fill="#e8e8ed" stroke="#d2d2d7" stroke-width="1" />
            <circle cx="250" cy="120" r="5"  fill="#86868b" />

            <!-- Bottom nodes -->
            <circle cx="100" cy="180" r="12" fill="#e8e8ed" stroke="#d2d2d7" stroke-width="0.8" />
            <circle cx="100" cy="180" r="4"  fill="#86868b" />
            <circle cx="220" cy="180" r="12" fill="#e8e8ed" stroke="#d2d2d7" stroke-width="0.8" />
            <circle cx="220" cy="180" r="4"  fill="#86868b" />

            <!-- Bottom center node -->
            <circle cx="160" cy="190" r="16" fill="#e8e8ed" stroke="#d2d2d7" stroke-width="1.2" />
            <circle cx="160" cy="190" r="6"  fill="#86868b" />

            <!-- Small floating dots -->
            <circle cx="130" cy="110" r="2" fill="#aeaeb2" />
            <circle cx="190" cy="110" r="2" fill="#aeaeb2" />
            <circle cx="145" cy="145" r="1.5" fill="#aeaeb2" />
            <circle cx="175" cy="150" r="1.5" fill="#aeaeb2" />
          </g>
        </svg>
      </div>
    </section>

    <!-- ═══ Right: Login Card ═══ -->
    <section class="login-panel" aria-label="登录">
      <div class="card">
        <h2>登录</h2>

        <form id="loginForm" autocomplete="on">
          <div class="field">
            <label for="username">账号</label>
            <input
              id="username"
              name="username"
              type="text"
              placeholder="输入账号"
              value="admin"
              autocomplete="username"
            />
          </div>

          <div class="field">
            <label for="password">密码</label>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="输入密码"
              value="admin"
              autocomplete="current-password"
            />
          </div>

          <div class="msg" id="msg" role="status" aria-live="polite"></div>

          <button class="btn" type="submit">登录</button>
        </form>

        <a class="forgot" href="javascript:void(0)" id="forgotLink">忘记密码？</a>

        <p class="footer">演示账号：admin / admin</p>
      </div>
    </section>

  </main>

  <script>
    const COOKIE_NAME = "ai_agent_login";
    const COOKIE_DAYS = 7;

    function setCookie(name, value, days) {
      const maxAge = Math.max(0, Math.floor(days * 86400));
      document.cookie = name + "=" + encodeURIComponent(value) + "; Max-Age=" + maxAge + "; Path=/; SameSite=Lax";
    }

    function getCookie(name) {
      var cookies = document.cookie ? document.cookie.split("; ") : [];
      for (var i = 0; i < cookies.length; i++) {
        var item = cookies[i];
        var eq = item.indexOf("=");
        var k = eq >= 0 ? item.slice(0, eq) : item;
        var v = eq >= 0 ? item.slice(eq + 1) : "";
        if (k === name) return decodeURIComponent(v);
      }
      return null;
    }

    function safeParseJson(text) {
      try { return JSON.parse(text); } catch (e) { return null; }
    }

    var form = document.getElementById("loginForm");
    var username = document.getElementById("username");
    var password = document.getElementById("password");
    var msg = document.getElementById("msg");
    var forgotLink = document.getElementById("forgotLink");

    function setMessage(text, type) {
      msg.textContent = text || "";
      msg.classList.toggle("error", type === "error");
    }

    function markInputError(el) {
      el.classList.add("error");
      setTimeout(function () { el.classList.remove("error"); }, 1200);
    }

    /* Boot: check existing cookie */
    (function boot() {
      var raw = getCookie(COOKIE_NAME);
      if (!raw) return;
      var payload = safeParseJson(raw);
      if (payload && payload.user) {
        window.location.replace("./index.html");
      }
    })();

    /* Forgot password */
    forgotLink.addEventListener("click", function (e) {
      e.preventDefault();
      setMessage("演示环境不支持重置密码，请使用 admin / admin 登录。", "info");
    });

    /* Login */
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      setMessage("");

      var u = (username.value || "").trim();
      var p = password.value || "";

      if (!u || !p) {
        setMessage("请输入账号与密码。", "error");
        if (!u) markInputError(username);
        if (!p) markInputError(password);
        return;
      }

      if (u !== "admin" || p !== "admin") {
        setMessage("账号或密码错误", "error");
        markInputError(username);
        markInputError(password);
        return;
      }

      var payload = JSON.stringify({ user: u, ts: Date.now() });
      setCookie(COOKIE_NAME, payload, COOKIE_DAYS);
      setMessage("登录成功，正在跳转…", "info");
      window.location.replace("./index.html");
    });
  </script>
</body>
</html>
